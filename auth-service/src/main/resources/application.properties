spring.application.name=auth-service
server.port=8081

spring.datasource.url=jdbc:mysql://auth-db:3306/authdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=60000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET:aW52ZW50b3J5TWFuYWdlbWVudFN5c3RlbVNlY3JldEtleUZvckhTMjU2QWxnb3JpdGhtMjAyNA==}
jwt.expiration-ms=3600000

# Cookie: set COOKIE_SECURE=true in production (requires HTTPS). false = local HTTP dev.
cookie.secure=${COOKIE_SECURE:false}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
