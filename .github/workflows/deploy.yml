name: InventoryMS Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      deploy_all:
        description: 'Deploy all services (first time setup or force redeploy)'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']

env:
  AWS_REGION:  ap-south-1
  ECS_CLUSTER: inventoryms-prod-cluster

defaults:
  run:
    shell: powershell

jobs:
# ───────────────────────────────────────────────────────────────────────────
# JOB 1 — detect which services changed
# ───────────────────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect changed services
    runs-on: self-hosted
    outputs:
      auth:         ${{ steps.set-flags.outputs.auth }}
      inventory:    ${{ steps.set-flags.outputs.inventory }}
      notification: ${{ steps.set-flags.outputs.notification }}
      reporting:    ${{ steps.set-flags.outputs.reporting }}
      supplier:     ${{ steps.set-flags.outputs.supplier }}
      frontend:     ${{ steps.set-flags.outputs.frontend }}
      terraform:    ${{ steps.set-flags.outputs.terraform }}
      shared_lib:   ${{ steps.set-flags.outputs.shared_lib }}
      ecr_base:     ${{ steps.ecr.outputs.ecr_base }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared_lib:
              - 'shared-lib/**'
              - 'pom.xml'
            auth:
              - 'auth-service/**'
              - 'shared-lib/**'
            inventory:
              - 'inventory-service/**'
              - 'shared-lib/**'
            notification:
              - 'notification-service/**'
              - 'shared-lib/**'
            reporting:
              - 'reporting-service/**'
              - 'shared-lib/**'
            supplier:
              - 'supplier-service/**'
              - 'shared-lib/**'
            frontend:
              - 'frontend/**'
            terraform:
              - 'terraform/**'

      - name: Set deployment flags
        id: set-flags
        run: |
          $force = "${{ github.event_name == 'workflow_dispatch' && inputs.deploy_all == 'true' }}"
          Write-Host "Force all: $force"
          if ($force -eq "true") {
            echo "auth=true"         >> $env:GITHUB_OUTPUT
            echo "inventory=true"    >> $env:GITHUB_OUTPUT
            echo "notification=true" >> $env:GITHUB_OUTPUT
            echo "reporting=true"    >> $env:GITHUB_OUTPUT
            echo "supplier=true"     >> $env:GITHUB_OUTPUT
            echo "frontend=true"     >> $env:GITHUB_OUTPUT
            echo "terraform=true"    >> $env:GITHUB_OUTPUT
            echo "shared_lib=true"   >> $env:GITHUB_OUTPUT
          } else {
            echo "auth=${{ steps.filter.outputs.auth }}"                 >> $env:GITHUB_OUTPUT
            echo "inventory=${{ steps.filter.outputs.inventory }}"       >> $env:GITHUB_OUTPUT
            echo "notification=${{ steps.filter.outputs.notification }}" >> $env:GITHUB_OUTPUT
            echo "reporting=${{ steps.filter.outputs.reporting }}"       >> $env:GITHUB_OUTPUT
            echo "supplier=${{ steps.filter.outputs.supplier }}"         >> $env:GITHUB_OUTPUT
            echo "frontend=${{ steps.filter.outputs.frontend }}"         >> $env:GITHUB_OUTPUT
            echo "terraform=${{ steps.filter.outputs.terraform }}"       >> $env:GITHUB_OUTPUT
            echo "shared_lib=${{ steps.filter.outputs.shared_lib }}"     >> $env:GITHUB_OUTPUT
          }

      - name: Resolve ECR base URL
        id: ecr
        run: |
          $ACCOUNT_ID = aws sts get-caller-identity --query Account --output text
          echo "ecr_base=$ACCOUNT_ID.dkr.ecr.$env:AWS_REGION.amazonaws.com/inventoryms-prod" >> $env:GITHUB_OUTPUT

# ───────────────────────────────────────────────────────────────────────────
# JOB 2 — build shared-lib
# FIX: setup-java@v4 downloads Java 21 for this job — no machine install needed
# ───────────────────────────────────────────────────────────────────────────
  build-shared-lib:
    name: Build shared-lib
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.shared_lib   == 'true' ||
      needs.detect-changes.outputs.auth         == 'true' ||
      needs.detect-changes.outputs.inventory    == 'true' ||
      needs.detect-changes.outputs.notification == 'true' ||
      needs.detect-changes.outputs.reporting    == 'true' ||
      needs.detect-changes.outputs.supplier     == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      # FIX 1 — download Java 21 for this job (runner only has Java 17)
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install shared-lib to local Maven cache
        run: mvn install -pl shared-lib -q -DskipTests

      - uses: actions/upload-artifact@v4
        with:
          name: shared-lib-m2
          path: ~/.m2/repository/com/inventory/shared-lib/
          retention-days: 1

# ───────────────────────────────────────────────────────────────────────────
# JOB 3 — auth-service
# ───────────────────────────────────────────────────────────────────────────
  deploy-auth:
    name: auth-service - Test - ECR - ECS
    needs: [detect-changes, build-shared-lib]
    if: |
      always() &&
      needs.detect-changes.outputs.auth == 'true' &&
      (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')
    runs-on: self-hosted
    env:
      ECR_BASE: ${{ needs.detect-changes.outputs.ecr_base }}
    steps:
      - uses: actions/checkout@v4

      # FIX 1 — Java 21 for Maven compilation
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Restore shared-lib
        uses: actions/download-artifact@v4
        with: { name: shared-lib-m2, path: ~/.m2/repository/com/inventory/shared-lib/ }
        continue-on-error: true

      - name: Run tests
        run: mvn test -pl auth-service -q

      - name: Authenticate Docker with ECR
        run: |
          $ACCOUNT_ID = aws sts get-caller-identity --query Account --output text
          aws ecr get-login-password --region $env:AWS_REGION | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$env:AWS_REGION.amazonaws.com"

      - name: Build and push image
        run: |
          docker build -t "$env:ECR_BASE/auth-service:${{ github.sha }}" -t "$env:ECR_BASE/auth-service:latest" ./auth-service
          docker push "$env:ECR_BASE/auth-service:${{ github.sha }}"
          docker push "$env:ECR_BASE/auth-service:latest"

      - name: Force ECS redeploy
        run: aws ecs update-service --cluster $env:ECS_CLUSTER --service inventoryms-prod-auth --force-new-deployment --region $env:AWS_REGION

      - name: Wait for stability
        run: aws ecs wait services-stable --cluster $env:ECS_CLUSTER --services inventoryms-prod-auth --region $env:AWS_REGION

# ───────────────────────────────────────────────────────────────────────────
# JOB 4 — inventory-service
# ───────────────────────────────────────────────────────────────────────────
  deploy-inventory:
    name: inventory-service - Test - ECR - ECS
    needs: [detect-changes, build-shared-lib]
    if: |
      always() &&
      needs.detect-changes.outputs.inventory == 'true' &&
      (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')
    runs-on: self-hosted
    env:
      ECR_BASE: ${{ needs.detect-changes.outputs.ecr_base }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - name: Restore shared-lib
        uses: actions/download-artifact@v4
        with: { name: shared-lib-m2, path: ~/.m2/repository/com/inventory/shared-lib/ }
        continue-on-error: true
      - name: Run tests
        run: mvn test -pl inventory-service -q
      - name: Authenticate Docker with ECR
        run: |
          $ACCOUNT_ID = aws sts get-caller-identity --query Account --output text
          aws ecr get-login-password --region $env:AWS_REGION | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$env:AWS_REGION.amazonaws.com"
      - name: Build and push image
        run: |
          docker build -t "$env:ECR_BASE/inventory-service:${{ github.sha }}" -t "$env:ECR_BASE/inventory-service:latest" ./inventory-service
          docker push "$env:ECR_BASE/inventory-service:${{ github.sha }}"
          docker push "$env:ECR_BASE/inventory-service:latest"
      - name: Force ECS redeploy
        run: aws ecs update-service --cluster $env:ECS_CLUSTER --service inventoryms-prod-inventory --force-new-deployment --region $env:AWS_REGION
      - name: Wait for stability
        run: aws ecs wait services-stable --cluster $env:ECS_CLUSTER --services inventoryms-prod-inventory --region $env:AWS_REGION

# ───────────────────────────────────────────────────────────────────────────
# JOB 5 — notification-service
# ───────────────────────────────────────────────────────────────────────────
  deploy-notification:
    name: notification-service - Test - ECR - ECS
    needs: [detect-changes, build-shared-lib]
    if: |
      always() &&
      needs.detect-changes.outputs.notification == 'true' &&
      (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')
    runs-on: self-hosted
    env:
      ECR_BASE: ${{ needs.detect-changes.outputs.ecr_base }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - name: Restore shared-lib
        uses: actions/download-artifact@v4
        with: { name: shared-lib-m2, path: ~/.m2/repository/com/inventory/shared-lib/ }
        continue-on-error: true
      - name: Run tests
        run: mvn test -pl notification-service -q
      - name: Authenticate Docker with ECR
        run: |
          $ACCOUNT_ID = aws sts get-caller-identity --query Account --output text
          aws ecr get-login-password --region $env:AWS_REGION | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$env:AWS_REGION.amazonaws.com"
      - name: Build and push image
        run: |
          docker build -t "$env:ECR_BASE/notification-service:${{ github.sha }}" -t "$env:ECR_BASE/notification-service:latest" ./notification-service
          docker push "$env:ECR_BASE/notification-service:${{ github.sha }}"
          docker push "$env:ECR_BASE/notification-service:latest"
      - name: Force ECS redeploy
        run: aws ecs update-service --cluster $env:ECS_CLUSTER --service inventoryms-prod-notification --force-new-deployment --region $env:AWS_REGION
      - name: Wait for stability
        run: aws ecs wait services-stable --cluster $env:ECS_CLUSTER --services inventoryms-prod-notification --region $env:AWS_REGION

# ───────────────────────────────────────────────────────────────────────────
# JOB 6 — reporting-service
# ───────────────────────────────────────────────────────────────────────────
  deploy-reporting:
    name: reporting-service - Test - ECR - ECS
    needs: [detect-changes, build-shared-lib]
    if: |
      always() &&
      needs.detect-changes.outputs.reporting == 'true' &&
      (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')
    runs-on: self-hosted
    env:
      ECR_BASE: ${{ needs.detect-changes.outputs.ecr_base }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - name: Restore shared-lib
        uses: actions/download-artifact@v4
        with: { name: shared-lib-m2, path: ~/.m2/repository/com/inventory/shared-lib/ }
        continue-on-error: true
      - name: Run tests
        run: mvn test -pl reporting-service -q
      - name: Authenticate Docker with ECR
        run: |
          $ACCOUNT_ID = aws sts get-caller-identity --query Account --output text
          aws ecr get-login-password --region $env:AWS_REGION | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$env:AWS_REGION.amazonaws.com"
      - name: Build and push image
        run: |
          docker build -t "$env:ECR_BASE/reporting-service:${{ github.sha }}" -t "$env:ECR_BASE/reporting-service:latest" ./reporting-service
          docker push "$env:ECR_BASE/reporting-service:${{ github.sha }}"
          docker push "$env:ECR_BASE/reporting-service:latest"
      - name: Force ECS redeploy
        run: aws ecs update-service --cluster $env:ECS_CLUSTER --service inventoryms-prod-reporting --force-new-deployment --region $env:AWS_REGION
      - name: Wait for stability
        run: aws ecs wait services-stable --cluster $env:ECS_CLUSTER --services inventoryms-prod-reporting --region $env:AWS_REGION

# ───────────────────────────────────────────────────────────────────────────
# JOB 7 — supplier-service
# ───────────────────────────────────────────────────────────────────────────
  deploy-supplier:
    name: supplier-service - Test - ECR - ECS
    needs: [detect-changes, build-shared-lib]
    if: |
      always() &&
      needs.detect-changes.outputs.supplier == 'true' &&
      (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')
    runs-on: self-hosted
    env:
      ECR_BASE: ${{ needs.detect-changes.outputs.ecr_base }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - name: Restore shared-lib
        uses: actions/download-artifact@v4
        with: { name: shared-lib-m2, path: ~/.m2/repository/com/inventory/shared-lib/ }
        continue-on-error: true
      - name: Run tests
        run: mvn test -pl supplier-service -q
      - name: Authenticate Docker with ECR
        run: |
          $ACCOUNT_ID = aws sts get-caller-identity --query Account --output text
          aws ecr get-login-password --region $env:AWS_REGION | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$env:AWS_REGION.amazonaws.com"
      - name: Build and push image
        run: |
          docker build -t "$env:ECR_BASE/supplier-service:${{ github.sha }}" -t "$env:ECR_BASE/supplier-service:latest" ./supplier-service
          docker push "$env:ECR_BASE/supplier-service:${{ github.sha }}"
          docker push "$env:ECR_BASE/supplier-service:latest"
      - name: Force ECS redeploy
        run: aws ecs update-service --cluster $env:ECS_CLUSTER --service inventoryms-prod-supplier --force-new-deployment --region $env:AWS_REGION
      - name: Wait for stability
        run: aws ecs wait services-stable --cluster $env:ECS_CLUSTER --services inventoryms-prod-supplier --region $env:AWS_REGION

# ───────────────────────────────────────────────────────────────────────────
# JOB 8 — frontend
# FIX: npm install instead of npm ci (no package-lock.json in MFE folders)
# ───────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: frontend MFEs - ECR - ECS
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend == 'true' &&
      (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')
    runs-on: self-hosted
    env:
      ECR_BASE: ${{ needs.detect-changes.outputs.ecr_base }}
    steps:
      - uses: actions/checkout@v4

      # FIX 3 — use npm install instead of npm ci (no package-lock.json exists)
      - name: Build dashboard-mfe
        working-directory: frontend/dashboard-mfe
        run: npm install; npm run build

      - name: Build products-mfe
        working-directory: frontend/products-mfe
        run: npm install; npm run build

      - name: Build stock-mfe
        working-directory: frontend/stock-mfe
        run: npm install; npm run build

      - name: Build supplier-mfe
        working-directory: frontend/supplier-mfe
        run: npm install; npm run build

      - name: Build reporting-mfe
        working-directory: frontend/reporting-mfe
        run: npm install; npm run build

      - name: Build shell
        working-directory: frontend/shell
        run: npm install; npm run build

      - name: Authenticate Docker with ECR
        run: |
          $ACCOUNT_ID = aws sts get-caller-identity --query Account --output text
          aws ecr get-login-password --region $env:AWS_REGION | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$env:AWS_REGION.amazonaws.com"

      - name: Build and push shell image
        working-directory: frontend/shell
        run: |
          docker build -t "$env:ECR_BASE/frontend:${{ github.sha }}" -t "$env:ECR_BASE/frontend:latest" .
          docker push "$env:ECR_BASE/frontend:${{ github.sha }}"
          docker push "$env:ECR_BASE/frontend:latest"

      - name: Force ECS redeploy
        run: aws ecs update-service --cluster $env:ECS_CLUSTER --service inventoryms-prod-frontend --force-new-deployment --region $env:AWS_REGION

      - name: Wait for stability
        run: aws ecs wait services-stable --cluster $env:ECS_CLUSTER --services inventoryms-prod-frontend --region $env:AWS_REGION

# ───────────────────────────────────────────────────────────────────────────
# JOB 9 — Terraform
# FIX: quote the var-file argument to prevent PowerShell splitting at =
# ───────────────────────────────────────────────────────────────────────────
  terraform:
    name: Terraform - plan / apply
    needs: detect-changes
    if: needs.detect-changes.outputs.terraform == 'true'
    runs-on: self-hosted
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: terraform init
        run: terraform init

      - name: terraform validate
        run: terraform validate

      # FIX 2 — quote var-file to prevent PowerShell splitting at = sign
      - name: terraform plan
        run: terraform plan "-var-file=terraform.tfvars" -no-color

      - name: terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
        run: terraform apply "-var-file=terraform.tfvars" -auto-approve

# ───────────────────────────────────────────────────────────────────────────
# JOB 10 — deployment summary
# ───────────────────────────────────────────────────────────────────────────
  notify:
    name: Deployment summary
    needs:
      - deploy-auth
      - deploy-inventory
      - deploy-notification
      - deploy-reporting
      - deploy-supplier
      - deploy-frontend
    if: always() && (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch')
    runs-on: self-hosted
    steps:
      - name: Write summary
        run: |
          Add-Content $env:GITHUB_STEP_SUMMARY "## InventoryMS Deployment Summary"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY "| Service | Result |"
          Add-Content $env:GITHUB_STEP_SUMMARY "|---------|--------|"
          Add-Content $env:GITHUB_STEP_SUMMARY "| auth-service         | ${{ needs.deploy-auth.result }} |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| inventory-service    | ${{ needs.deploy-inventory.result }} |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| notification-service | ${{ needs.deploy-notification.result }} |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| reporting-service    | ${{ needs.deploy-reporting.result }} |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| supplier-service     | ${{ needs.deploy-supplier.result }} |"
          Add-Content $env:GITHUB_STEP_SUMMARY "| frontend             | ${{ needs.deploy-frontend.result }} |"
          Add-Content $env:GITHUB_STEP_SUMMARY "Commit: ${{ github.sha }}"
