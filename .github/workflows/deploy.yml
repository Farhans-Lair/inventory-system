name: InventoryMS Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  AWS_REGION:  ap-south-1
  ECS_CLUSTER: inventoryms-prod-cluster

jobs:
# ───────────────────────────────────────────────────────────────────────────
# JOB 1 — detect which services changed
# ───────────────────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect changed services
    runs-on: self-hosted
    outputs:
      shared_lib:   ${{ steps.filter.outputs.shared_lib }}
      auth:         ${{ steps.filter.outputs.auth }}
      inventory:    ${{ steps.filter.outputs.inventory }}
      notification: ${{ steps.filter.outputs.notification }}
      reporting:    ${{ steps.filter.outputs.reporting }}
      supplier:     ${{ steps.filter.outputs.supplier }}
      frontend:     ${{ steps.filter.outputs.frontend }}
      terraform:    ${{ steps.filter.outputs.terraform }}
      ecr_base:     ${{ steps.ecr.outputs.ecr_base }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared_lib:
              - 'shared-lib/**'
              - 'pom.xml'
            auth:
              - 'auth-service/**'
              - 'shared-lib/**'
            inventory:
              - 'inventory-service/**'
              - 'shared-lib/**'
            notification:
              - 'notification-service/**'
              - 'shared-lib/**'
            reporting:
              - 'reporting-service/**'
              - 'shared-lib/**'
            supplier:
              - 'supplier-service/**'
              - 'shared-lib/**'
            frontend:
              - 'frontend/**'
            terraform:
              - 'terraform/**'

      - name: Resolve ECR base URL
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ecr_base=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/inventoryms-prod" >> $GITHUB_OUTPUT

# ───────────────────────────────────────────────────────────────────────────
# JOB 2 — build shared-lib
# ───────────────────────────────────────────────────────────────────────────
  build-shared-lib:
    name: Build shared-lib
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.shared_lib   == 'true' ||
      needs.detect-changes.outputs.auth         == 'true' ||
      needs.detect-changes.outputs.inventory    == 'true' ||
      needs.detect-changes.outputs.notification == 'true' ||
      needs.detect-changes.outputs.reporting    == 'true' ||
      needs.detect-changes.outputs.supplier     == 'true'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Install shared-lib to local Maven cache
        run: mvn install -pl shared-lib -q -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: shared-lib-m2
          path: ~/.m2/repository/com/inventory/shared-lib/
          retention-days: 1

# ───────────────────────────────────────────────────────────────────────────
# JOB 3 — auth-service
# ───────────────────────────────────────────────────────────────────────────
  deploy-auth:
    name: auth-service - Test - ECR - ECS
    needs: [detect-changes, build-shared-lib]
    if: |
      always() &&
      needs.detect-changes.outputs.auth == 'true' &&
      github.ref == 'refs/heads/master'
    runs-on: self-hosted
    env:
      ECR_BASE: ${{ needs.detect-changes.outputs.ecr_base }}
    steps:
      - uses: actions/checkout@v4
      - name: Restore shared-lib
        uses: actions/download-artifact@v4
        with: { name: shared-lib-m2, path: ~/.m2/repository/com/inventory/shared-lib/ }
        continue-on-error: true
      - name: Run tests
        run: mvn test -pl auth-service -q
      - name: Authenticate Docker with ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
      - name: Build and push image
        run: |
          docker build -t $ECR_BASE/auth-service:${{ github.sha }} -t $ECR_BASE/auth-service:latest ./auth-service
          docker push $ECR_BASE/auth-service:${{ github.sha }}
          docker push $ECR_BASE/auth-service:latest
      - name: Force ECS redeploy
        run: aws ecs update-service --cluster $ECS_CLUSTER --service inventoryms-prod-auth --force-new-deployment --region $AWS_REGION
      - name: Wait for stability
        run: aws ecs wait services-stable --cluster $ECS_CLUSTER --services inventoryms-prod-auth --region $AWS_REGION

# ───────────────────────────────────────────────────────────────────────────
# JOB 4 — inventory-service
# ───────────────────────────────────────────────────────────────────────────
  deploy-inventory:
    name: inventory-service - Test - ECR - ECS
    needs: [detect-changes, build-shared-lib]
    if: |
      always() &&
      needs.detect-changes.outputs.inventory == 'true' &&
      github.ref == 'refs/heads/master'
    runs-on: self-hosted
    env:
      ECR_BASE: ${{ needs.detect-changes.outputs.ecr_base }}
    steps:
      - uses: actions/checkout@v4
      - name: Restore shared-lib
        uses: actions/download-artifact@v4
        with: { name: shared-lib-m2, path: ~/.m2/repository/com/inventory/shared-lib/ }
        continue-on-error: true
      - name: Run tests
        run: mvn test -pl inventory-service -q
      - name: Authenticate Docker with ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
      - name: Build and push image
        run: |
          docker build -t $ECR_BASE/inventory-service:${{ github.sha }} -t $ECR_BASE/inventory-service:latest ./inventory-service
          docker push $ECR_BASE/inventory-service:${{ github.sha }}
          docker push $ECR_BASE/inventory-service:latest
      - name: Force ECS redeploy
        run: aws ecs update-service --cluster $ECS_CLUSTER --service inventoryms-prod-inventory --force-new-deployment --region $AWS_REGION
      - name: Wait for stability
        run: aws ecs wait services-stable --cluster $ECS_CLUSTER --services inventoryms-prod-inventory --region $AWS_REGION

# ───────────────────────────────────────────────────────────────────────────
# JOB 5 — notification-service
# ───────────────────────────────────────────────────────────────────────────
  deploy-notification:
    name: notification-service - Test - ECR - ECS
    needs: [detect-changes, build-shared-lib]
    if: |
      always() &&
      needs.detect-changes.outputs.notification == 'true' &&
      github.ref == 'refs/heads/master'
    runs-on: self-hosted
    env:
      ECR_BASE: ${{ needs.detect-changes.outputs.ecr_base }}
    steps:
      - uses: actions/checkout@v4
      - name: Restore shared-lib
        uses: actions/download-artifact@v4
        with: { name: shared-lib-m2, path: ~/.m2/repository/com/inventory/shared-lib/ }
        continue-on-error: true
      - name: Run tests
        run: mvn test -pl notification-service -q
      - name: Authenticate Docker with ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
      - name: Build and push image
        run: |
          docker build -t $ECR_BASE/notification-service:${{ github.sha }} -t $ECR_BASE/notification-service:latest ./notification-service
          docker push $ECR_BASE/notification-service:${{ github.sha }}
          docker push $ECR_BASE/notification-service:latest
      - name: Force ECS redeploy
        run: aws ecs update-service --cluster $ECS_CLUSTER --service inventoryms-prod-notification --force-new-deployment --region $AWS_REGION
      - name: Wait for stability
        run: aws ecs wait services-stable --cluster $ECS_CLUSTER --services inventoryms-prod-notification --region $AWS_REGION

# ───────────────────────────────────────────────────────────────────────────
# JOB 6 — reporting-service
# ───────────────────────────────────────────────────────────────────────────
  deploy-reporting:
    name: reporting-service - Test - ECR - ECS
    needs: [detect-changes, build-shared-lib]
    if: |
      always() &&
      needs.detect-changes.outputs.reporting == 'true' &&
      github.ref == 'refs/heads/master'
    runs-on: self-hosted
    env:
      ECR_BASE: ${{ needs.detect-changes.outputs.ecr_base }}
    steps:
      - uses: actions/checkout@v4
      - name: Restore shared-lib
        uses: actions/download-artifact@v4
        with: { name: shared-lib-m2, path: ~/.m2/repository/com/inventory/shared-lib/ }
        continue-on-error: true
      - name: Run tests
        run: mvn test -pl reporting-service -q
      - name: Authenticate Docker with ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
      - name: Build and push image
        run: |
          docker build -t $ECR_BASE/reporting-service:${{ github.sha }} -t $ECR_BASE/reporting-service:latest ./reporting-service
          docker push $ECR_BASE/reporting-service:${{ github.sha }}
          docker push $ECR_BASE/reporting-service:latest
      - name: Force ECS redeploy
        run: aws ecs update-service --cluster $ECS_CLUSTER --service inventoryms-prod-reporting --force-new-deployment --region $AWS_REGION
      - name: Wait for stability
        run: aws ecs wait services-stable --cluster $ECS_CLUSTER --services inventoryms-prod-reporting --region $AWS_REGION

# ───────────────────────────────────────────────────────────────────────────
# JOB 7 — supplier-service
# ───────────────────────────────────────────────────────────────────────────
  deploy-supplier:
    name: supplier-service - Test - ECR - ECS
    needs: [detect-changes, build-shared-lib]
    if: |
      always() &&
      needs.detect-changes.outputs.supplier == 'true' &&
      github.ref == 'refs/heads/master'
    runs-on: self-hosted
    env:
      ECR_BASE: ${{ needs.detect-changes.outputs.ecr_base }}
    steps:
      - uses: actions/checkout@v4
      - name: Restore shared-lib
        uses: actions/download-artifact@v4
        with: { name: shared-lib-m2, path: ~/.m2/repository/com/inventory/shared-lib/ }
        continue-on-error: true
      - name: Run tests
        run: mvn test -pl supplier-service -q
      - name: Authenticate Docker with ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
      - name: Build and push image
        run: |
          docker build -t $ECR_BASE/supplier-service:${{ github.sha }} -t $ECR_BASE/supplier-service:latest ./supplier-service
          docker push $ECR_BASE/supplier-service:${{ github.sha }}
          docker push $ECR_BASE/supplier-service:latest
      - name: Force ECS redeploy
        run: aws ecs update-service --cluster $ECS_CLUSTER --service inventoryms-prod-supplier --force-new-deployment --region $AWS_REGION
      - name: Wait for stability
        run: aws ecs wait services-stable --cluster $ECS_CLUSTER --services inventoryms-prod-supplier --region $AWS_REGION

# ───────────────────────────────────────────────────────────────────────────
# JOB 8 — frontend
# ───────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: frontend MFEs - ECR - ECS
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.frontend == 'true' &&
      github.ref == 'refs/heads/master'
    runs-on: self-hosted
    env:
      ECR_BASE: ${{ needs.detect-changes.outputs.ecr_base }}
    steps:
      - uses: actions/checkout@v4
      - name: Build dashboard-mfe
        working-directory: frontend/dashboard-mfe
        run: npm ci && npm run build
      - name: Build products-mfe
        working-directory: frontend/products-mfe
        run: npm ci && npm run build
      - name: Build stock-mfe
        working-directory: frontend/stock-mfe
        run: npm ci && npm run build
      - name: Build supplier-mfe
        working-directory: frontend/supplier-mfe
        run: npm ci && npm run build
      - name: Build reporting-mfe
        working-directory: frontend/reporting-mfe
        run: npm ci && npm run build
      - name: Build shell
        working-directory: frontend/shell
        run: npm ci && npm run build
      - name: Authenticate Docker with ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin ${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
      - name: Build and push shell image
        working-directory: frontend/shell
        run: |
          docker build -t $ECR_BASE/frontend:${{ github.sha }} -t $ECR_BASE/frontend:latest .
          docker push $ECR_BASE/frontend:${{ github.sha }}
          docker push $ECR_BASE/frontend:latest
      - name: Force ECS redeploy
        run: aws ecs update-service --cluster $ECS_CLUSTER --service inventoryms-prod-frontend --force-new-deployment --region $AWS_REGION
      - name: Wait for stability
        run: aws ecs wait services-stable --cluster $ECS_CLUSTER --services inventoryms-prod-frontend --region $AWS_REGION

# ───────────────────────────────────────────────────────────────────────────
# JOB 9 — Terraform
# ───────────────────────────────────────────────────────────────────────────
  terraform:
    name: Terraform - plan / apply
    needs: detect-changes
    if: needs.detect-changes.outputs.terraform == 'true'
    runs-on: self-hosted
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - name: terraform init
        run: terraform init
      - name: terraform validate
        run: terraform validate
      - name: terraform plan
        run: terraform plan -var-file=terraform.tfvars -no-color
      - name: terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: terraform apply -var-file=terraform.tfvars -auto-approve

# ───────────────────────────────────────────────────────────────────────────
# JOB 10 — deployment summary
# ───────────────────────────────────────────────────────────────────────────
  notify:
    name: Deployment summary
    needs:
      - deploy-auth
      - deploy-inventory
      - deploy-notification
      - deploy-reporting
      - deploy-supplier
      - deploy-frontend
    if: always() && github.ref == 'refs/heads/master'
    runs-on: self-hosted
    steps:
      - name: Write summary
        run: |
          echo "## InventoryMS Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| auth-service         | ${{ needs.deploy-auth.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| inventory-service    | ${{ needs.deploy-inventory.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| notification-service | ${{ needs.deploy-notification.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| reporting-service    | ${{ needs.deploy-reporting.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| supplier-service     | ${{ needs.deploy-supplier.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| frontend             | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
