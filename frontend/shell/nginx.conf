server {
    listen 80;
    server_name _;

    # ── Shell (React app) ─────────────────────────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── MFE remotes — each served at /mfe/<name>/ ─────────────────────────
    # Shell loads remoteEntry.js from these paths at runtime
    location /mfe/dashboard/ {
        alias /usr/share/nginx/html/mfe/dashboard/;
        try_files $uri $uri/ /mfe/dashboard/index.html;
    }

    location /mfe/products/ {
        alias /usr/share/nginx/html/mfe/products/;
        try_files $uri $uri/ /mfe/products/index.html;
    }

    location /mfe/stock/ {
        alias /usr/share/nginx/html/mfe/stock/;
        try_files $uri $uri/ /mfe/stock/index.html;
    }

    location /mfe/supplier/ {
        alias /usr/share/nginx/html/mfe/supplier/;
        try_files $uri $uri/ /mfe/supplier/index.html;
    }

    location /mfe/reporting/ {
        alias /usr/share/nginx/html/mfe/reporting/;
        try_files $uri $uri/ /mfe/reporting/index.html;
    }

    # ── Health check ──────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
