server {
    listen 80;
    server_name _;

    # ── Shell (React app) ─────────────────────────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── MFE remotes — each served at /mfe/<name>/ ─────────────────────────
    # IMPORTANT: Do NOT use try_files with an HTML fallback here.
    # remoteEntry.js and chunk assets are static files — if they are missing
    # we must return 404, not index.html. Returning HTML causes the browser
    # to parse it as JS and throw "Unexpected token '<'".
    location /mfe/dashboard/ {
        alias /usr/share/nginx/html/mfe/dashboard/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        try_files $uri $uri/ =404;
    }

    location /mfe/products/ {
        alias /usr/share/nginx/html/mfe/products/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        try_files $uri $uri/ =404;
    }

    location /mfe/stock/ {
        alias /usr/share/nginx/html/mfe/stock/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        try_files $uri $uri/ =404;
    }

    location /mfe/supplier/ {
        alias /usr/share/nginx/html/mfe/supplier/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        try_files $uri $uri/ =404;
    }

    location /mfe/reporting/ {
        alias /usr/share/nginx/html/mfe/reporting/;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        try_files $uri $uri/ =404;
    }

    # ── Health check ──────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
