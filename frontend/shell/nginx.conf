server {
    listen 80;
    server_name _;

    # ── Shell (React app) ─────────────────────────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;

        # index.html: never cache — always fetch fresh so the browser picks up
        # new chunk filenames after a deployment.
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Hashed JS/CSS assets: safe to cache for 1 year (content-addressed).
        location ~* \.(?:js|css|woff2?|png|svg|ico)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # ── MFE remotes — each served at /mfe/<name>/ ─────────────────────────
    # IMPORTANT: Use `root` NOT `alias` here.
    #
    # With `alias`, $uri still contains the full path (e.g. /mfe/dashboard/assets/remoteEntry.js),
    # so nginx resolves: <alias> + $uri = double path -> file not found -> 404.
    #
    # With `root`, nginx strips the matched location prefix from $uri before
    # appending to root, so:
    #   request: /mfe/dashboard/assets/remoteEntry.js
    #   resolves: /usr/share/nginx/html + /mfe/dashboard/assets/remoteEntry.js -> CORRECT
    #
    # One `root` block covers all /mfe/* paths since files are under that same tree.
    location /mfe/ {
        root /usr/share/nginx/html;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        try_files $uri $uri/ =404;

        # remoteEntry.js has no content hash in its filename — MUST NOT be cached,
        # otherwise a browser serving a stale remoteEntry.js after a deployment will
        # reference chunk hashes that no longer exist, causing
        # "This module cannot be loaded" on page refresh.
        location ~* remoteEntry\.js$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            add_header Access-Control-Allow-Origin *;
        }

        # All other MFE assets (hashed chunks) can be cached long-term.
        location ~* \.(?:js|css)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin *;
        }
    }

    # ── Health check ──────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
