server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Auth service
    location /api/auth/ {
        proxy_pass         http://auth-service:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   Cookie            $http_cookie;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_pass_header  Set-Cookie;
    }

    location /api/users {
        proxy_pass         http://auth-service:8081;
        proxy_set_header   Host              $host;
        proxy_set_header   Cookie            $http_cookie;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_pass_header  Set-Cookie;
    }

    # Inventory service
    location /api/products {
        proxy_pass         http://inventory-service:8082;
        proxy_set_header   Host              $host;
        proxy_set_header   Cookie            $http_cookie;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_pass_header  Set-Cookie;
    }

    location /api/locations {
        proxy_pass         http://inventory-service:8082;
        proxy_set_header   Host              $host;
        proxy_set_header   Cookie            $http_cookie;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_pass_header  Set-Cookie;
    }

    location /api/stock {
        proxy_pass         http://inventory-service:8082;
        proxy_set_header   Host              $host;
        proxy_set_header   Cookie            $http_cookie;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_pass_header  Set-Cookie;
    }

    location /api/batch-lots {
        proxy_pass         http://inventory-service:8082;
        proxy_set_header   Host              $host;
        proxy_set_header   Cookie            $http_cookie;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_pass_header  Set-Cookie;
    }

    location /api/cycle-counts {
        proxy_pass         http://inventory-service:8082;
        proxy_set_header   Host              $host;
        proxy_set_header   Cookie            $http_cookie;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_pass_header  Set-Cookie;
    }

    # Notification service
    location /api/notifications {
        proxy_pass         http://notification-service:8083;
        proxy_set_header   Host              $host;
        proxy_set_header   Cookie            $http_cookie;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_pass_header  Set-Cookie;
    }

    # Reporting service
    location /api/reports {
        proxy_pass         http://reporting-service:8084;
        proxy_set_header   Host              $host;
        proxy_set_header   Cookie            $http_cookie;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_pass_header  Set-Cookie;
    }

    # Supplier service
    location /api/suppliers {
        proxy_pass         http://supplier-service:8085;
        proxy_set_header   Host              $host;
        proxy_set_header   Cookie            $http_cookie;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_pass_header  Set-Cookie;
    }

    location /api/purchase-orders {
        proxy_pass         http://supplier-service:8085;
        proxy_set_header   Host              $host;
        proxy_set_header   Cookie            $http_cookie;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_pass_header  Set-Cookie;
    }
}
