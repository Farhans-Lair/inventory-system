spring.application.name=inventory-service
server.port=8082

spring.datasource.url=jdbc:mysql://inventory-db:3306/${INVENTORY_DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=60000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt.secret=${JWT_SECRET}

# S3 image storage — credentials come from ECS task IAM role (no static keys needed)
aws.s3.region=${AWS_REGION:ap-south-1}
minio.bucket=${MINIO_BUCKET:inventory-images}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always


# ── Startup & liveness tuning ─────────────────────────────────────────────
# Defer DataSource initialization to after application context starts —
# this prevents a slow DB connection from blocking the actuator health endpoint
# during the ECS health check grace period, which would cause 502s on cold start.
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000

# Actuator: expose startup probe separately from liveness/readiness
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
