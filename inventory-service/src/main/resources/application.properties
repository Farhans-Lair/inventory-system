spring.application.name=inventory-service
server.port=8082

spring.datasource.url=jdbc:mysql://inventory-db:3306/inventorydb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=60000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt.secret=${JWT_SECRET:aW52ZW50b3J5TWFuYWdlbWVudFN5c3RlbVNlY3JldEtleUZvckhTMjU2QWxnb3JpdGhtMjAyNA==}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
