spring.application.name=inventory-service
server.port=8082

spring.datasource.url=jdbc:mysql://inventory-db:3306/${INVENTORY_DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=60000

# ddl-auto replaced by Flyway (see below)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt.secret=${JWT_SECRET}

# S3 image storage — credentials come from ECS task IAM role (no static keys needed)
aws.s3.region=${AWS_REGION:ap-south-1}
minio.bucket=${MINIO_BUCKET:inventory-images}

# S3 report archival — generated CSV reports are stored here under reports/<module>/
reports.bucket=${REPORTS_BUCKET:inventoryms-reports}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always


# ── Startup & liveness tuning ─────────────────────────────────────────────
# Defer DataSource initialization to after application context starts —
# this prevents a slow DB connection from blocking the actuator health endpoint
# during the ECS health check grace period, which would cause 502s on cold start.
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000

# Actuator: expose startup probe separately from liveness/readiness
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ── Flyway: controlled schema migrations ──────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ── Spring Cache: Caffeine in-process cache ───────────────────────────────
# products cache: 30s TTL — short enough that new products appear quickly
# stockLevels cache: 30s TTL — balances freshness vs DB load
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=30s

# ── AWS X-Ray ─────────────────────────────────────────────────────────────
com.amazonaws.xray.strategy.LogErrorContextMissingStrategy=true
