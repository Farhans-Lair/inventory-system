spring.application.name=reporting-service
server.port=8084

spring.datasource.url=jdbc:mysql://inventory-db:3306/${INVENTORY_DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=60000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET}

# S3 report archival — generated CSV reports are stored here under reports/<module>/
aws.s3.region=${AWS_REGION:ap-south-1}
reports.bucket=${REPORTS_BUCKET:inventoryms-reports}

management.endpoints.web.exposure.include=health,info


# ── Startup & liveness tuning ─────────────────────────────────────────────
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ── Spring Cache: Caffeine for valuation query ────────────────────────────
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=60s

# ── AWS X-Ray ─────────────────────────────────────────────────────────────
com.amazonaws.xray.strategy.LogErrorContextMissingStrategy=true
