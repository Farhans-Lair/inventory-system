version: "3.8"

networks:
  inventory-net:
    driver: bridge

volumes:
  auth-db-data:
  inventory-db-data:
  notification-db-data:
  supplier-db-data:
  minio-data:

services:
  auth-db:
    image: mysql:8.0
    container_name: auth-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${AUTH_DB_NAME}
    ports:
      - "${AUTH_DB_PORT}:3306"
    networks:
      - inventory-net
    volumes:
      - auth-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USER}", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 10

  inventory-db:
    image: mysql:8.0
    container_name: inventory-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${INVENTORY_DB_NAME}
    ports:
      - "${INVENTORY_DB_PORT}:3306"
    networks:
      - inventory-net
    volumes:
      - inventory-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USER}", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 10

  notification-db:
    image: mysql:8.0
    container_name: notification-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${NOTIFICATION_DB_NAME}
    ports:
      - "${NOTIFICATION_DB_PORT}:3306"
    networks:
      - inventory-net
    volumes:
      - notification-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USER}", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 10

  supplier-db:
    image: mysql:8.0
    container_name: supplier-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${SUPPLIER_DB_NAME}
    ports:
      - "${SUPPLIER_DB_PORT}:3306"
    networks:
      - inventory-net
    volumes:
      - supplier-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USER}", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "${AUTH_SERVICE_PORT}:8081"
    environment:
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      AUTH_DB_NAME: ${AUTH_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECURE: ${COOKIE_SECURE}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    networks:
      - inventory-net
    depends_on:
      auth-db:
        condition: service_healthy
    restart: on-failure

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports:
      - "${INVENTORY_SERVICE_PORT}:8082"
    environment:
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      INVENTORY_DB_NAME: ${INVENTORY_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      # S3 image storage: in local dev, image uploads are disabled (no AWS creds).
      # In prod, the ECS task IAM role provides credentials automatically.
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      MINIO_BUCKET: ${MINIO_BUCKET:-inventory-images}
    networks:
      - inventory-net
    depends_on:
      inventory-db:
        condition: service_healthy
    restart: on-failure

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:8083"
    environment:
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      NOTIFICATION_DB_NAME: ${NOTIFICATION_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      ALERT_RECIPIENTS: ${ALERT_RECIPIENTS}
    networks:
      - inventory-net
    depends_on:
      notification-db:
        condition: service_healthy
    restart: on-failure

  reporting-service:
    build: ./reporting-service
    container_name: reporting-service
    ports:
      - "${REPORTING_SERVICE_PORT}:8084"
    environment:
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      INVENTORY_DB_NAME: ${INVENTORY_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - inventory-net
    depends_on:
      inventory-db:
        condition: service_healthy
    restart: on-failure

  supplier-service:
    build: ./supplier-service
    container_name: supplier-service
    ports:
      - "${SUPPLIER_SERVICE_PORT}:8085"
    environment:
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      SUPPLIER_DB_NAME: ${SUPPLIER_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - inventory-net
    depends_on:
      supplier-db:
        condition: service_healthy
    restart: on-failure

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    networks:
      - inventory-net
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard-mfe:
    build: ./frontend/dashboard-mfe
    container_name: dashboard-mfe
    ports:
      - "3001:80"
    networks:
      - inventory-net

  products-mfe:
    build: ./frontend/products-mfe
    container_name: products-mfe
    ports:
      - "3002:80"
    networks:
      - inventory-net

  stock-mfe:
    build: ./frontend/stock-mfe
    container_name: stock-mfe
    ports:
      - "3003:80"
    networks:
      - inventory-net

  supplier-mfe:
    build: ./frontend/supplier-mfe
    container_name: supplier-mfe
    ports:
      - "3004:80"
    networks:
      - inventory-net

  reporting-mfe:
    build: ./frontend/reporting-mfe
    container_name: reporting-mfe
    ports:
      - "3005:80"
    networks:
      - inventory-net

  frontend:
    build: ./frontend/shell
    container_name: frontend
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - inventory-net
    depends_on:
      - auth-service
      - inventory-service
      - notification-service
      - reporting-service
      - supplier-service
      - dashboard-mfe
      - products-mfe
      - stock-mfe
      - supplier-mfe
      - reporting-mfe