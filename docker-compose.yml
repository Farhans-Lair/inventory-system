version: '3.9'

networks:
  inventory-net:
    driver: bridge

volumes:
  auth-db-data:
  inventory-db-data:
  notification-db-data:
  supplier-db-data:
  minio-data:

services:

  # ── Databases ──────────────────────────────────────────────────────────────

  auth-db:
    image: mysql:8.0
    container_name: auth-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: authdb
    ports:
      - "3307:3306"
    networks:
      - inventory-net
    volumes:
      - auth-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  inventory-db:
    image: mysql:8.0
    container_name: inventory-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventorydb
    ports:
      - "3308:3306"
    networks:
      - inventory-net
    volumes:
      - inventory-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  notification-db:
    image: mysql:8.0
    container_name: notification-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notificationdb
    ports:
      - "3309:3306"
    networks:
      - inventory-net
    volumes:
      - notification-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  supplier-db:
    image: mysql:8.0
    container_name: supplier-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: supplierdb
    ports:
      - "3310:3306"
    networks:
      - inventory-net
    volumes:
      - supplier-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Application services ───────────────────────────────────────────────────

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      DB_USER: root
      DB_PASS: root
      JWT_SECRET: aW52ZW50b3J5TWFuYWdlbWVudFN5c3RlbVNlY3JldEtleUZvckhTMjU2QWxnb3JpdGhtMjAyNA==
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    networks:
      - inventory-net
    depends_on:
      auth-db:
        condition: service_healthy
    restart: on-failure

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports:
      - "8082:8082"
    environment:
      DB_USER: root
      DB_PASS: root
      JWT_SECRET: aW52ZW50b3J5TWFuYWdlbWVudFN5c3RlbVNlY3JldEtleUZvckhTMjU2QWxnb3JpdGhtMjAyNA==
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: inventory-images
    networks:
      - inventory-net
    depends_on:
      inventory-db:
        condition: service_healthy
    restart: on-failure

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8083:8083"
    environment:
      DB_USER: root
      DB_PASS: root
      JWT_SECRET: aW52ZW50b3J5TWFuYWdlbWVudFN5c3RlbVNlY3JldEtleUZvckhTMjU2QWxnb3JpdGhtMjAyNA==
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      ALERT_RECIPIENTS: ${ALERT_RECIPIENTS:-}
    networks:
      - inventory-net
    depends_on:
      notification-db:
        condition: service_healthy
    restart: on-failure

  reporting-service:
    build: ./reporting-service
    container_name: reporting-service
    ports:
      - "8084:8084"
    environment:
      DB_USER: root
      DB_PASS: root
      JWT_SECRET: aW52ZW50b3J5TWFuYWdlbWVudFN5c3RlbVNlY3JldEtleUZvckhTMjU2QWxnb3JpdGhtMjAyNA==
    networks:
      - inventory-net
    depends_on:
      inventory-db:
        condition: service_healthy
    restart: on-failure

  supplier-service:
    build: ./supplier-service
    container_name: supplier-service
    ports:
      - "8085:8085"
    environment:
      DB_USER: root
      DB_PASS: root
      JWT_SECRET: aW52ZW50b3J5TWFuYWdlbWVudFN5c3RlbVNlY3JldEtleUZvckhTMjU2QWxnb3JpdGhtMjAyNA==
    networks:
      - inventory-net
    depends_on:
      supplier-db:
        condition: service_healthy
    restart: on-failure


  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - inventory-net
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    networks:
      - inventory-net
    depends_on:
      - auth-service
      - inventory-service
      - notification-service
      - reporting-service
      - supplier-service
